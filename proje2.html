<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>React App</title>
    <link rel="stylesheet" href="proje2.css">
</head>

<body>

</body>
    <div id="root">
        <div class="sidebar">
            <div class="topbar">
                <div class="logo-box">
                    <img class="logo" src="logo.png" alt="logo">
                    <h1>StartUppilot</h1>
                </div>
                <div class="new-plan">
                    <button class="">+ New Plan</button>
                </div>

                <div class="plans">
                    <p>Plans</p>
                   <ul>
                        <li class="item1">Plan 1</li>
                        <li class="item1">Plan 2</li>
                        <li class="item1">Plan 3</li>
                    </ul>
                </div>
            </div>

            <div class="profilebar">
               <button class="profile-btn">♡ My Account</button> 
               <button class="upgrade-btn">✧ Upgrade to Pro</button>
               <button class="download-btn">⇩ Download & Print</button>
            </div>
        </div>
















        

        <div class="outlinePanel">

            <div>

                <div>
                    <div class="outline">
                        <h2>Outline</h2>
                    </div>
                </div>

                <div class="outline-menu">

                    <article class="main">
                        <div>🏠</div>
                        <button >Main</button>
                    </article>

                    <article class="naming">
                        <div>🏷️</div>
                        <button >Naming</button>
                    </article>

                    <article class="riskRate">
                        <div>⚠️</div>
                        <button >Risk Rate</button>
                    </article>

                    <article class="simProMark">
                        <div>🔍</div>
                        <button >Simillar Projects in the Market</button>
                    </article>

                    <article class="finCalc">
                        <div>🧮</div>
                        <button >Financial Calaculations</button>
                    </article>

                    <article class="desingSugg">
                        <div>💡</div>
                        <button >Desing Suggestions</button>
                    </article>

                    <article class="searchList">
                        <div>📋</div>
                        <button >Search List</button>
                    </article>

                </div>
              
            </div>

            <div class="print-preview">
                <button>🖨️ Print Preview</button>
            </div>
        </div>























        <div class="content">
            <h3>Q1 2026 Business Plan</h3>
            <h4>Where should we start?</h4>
            <p>Describe your idea or pick a focus below.</p>

            <form class="startup-prompt-form">
                <input type="search" placeholder="Ask Start Pilot.." />
                <button type="submit">⮝</button>
            </form>

             <div class="ai-action-btn">
                <button>Help me with naming ideas</button>
                <button>Analyze risk for my idea</button>
                <button>Find similar projects</button>
                <button>Financial projections</button>
                <button>Design suggestions</button>
                <button>Search list</button>
            </div>

        </div>

    </div>

</html>
